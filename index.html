<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spark Point | Web3 Ecosystem</title>
    <style>
        :root {
            --gold: #ffcc00;
            --green: #00ff88;
            --bg: #050505;
            --card: #121214;
            --text: #e2e8f0;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 50px;
        }

        /* Шапка и переключатель языка */
        .top-bar {
            width: 100%;
            display: flex;
            justify-content: flex-end;
            padding: 20px;
            box-sizing: border-box;
        }

        .lang-btn {
            background: #1e1e22;
            color: var(--gold);
            border: 1px solid var(--gold);
            padding: 5px 15px;
            cursor: pointer;
            margin-left: 10px;
            border-radius: 5px;
            font-weight: bold;
        }

        .lang-btn.active {
            background: var(--gold);
            color: #000;
        }

        header { text-align: center; padding: 20px 0 40px; }
        .project-title {
            color: var(--gold);
            font-size: clamp(2rem, 8vw, 3.5rem);
            font-weight: 900;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(255, 204, 0, 0.4);
            margin: 0;
        }

        /* Сетка карточек */
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            max-width: 1200px;
            width: 90%;
        }

        .card {
            background: var(--card);
            border: 1px solid #222;
            border-radius: 24px;
            padding: 25px;
            text-align: center;
            transition: 0.3s;
        }

        .card:hover { border-color: var(--gold); }

        .price-tag { color: var(--gold); font-size: 2rem; font-weight: 800; margin: 15px 0; }

        .btn-group { display: flex; flex-direction: column; gap: 10px; }

        .btn {
            padding: 15px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.85rem;
            border: none;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-info { background: var(--gold); color: #000; }
        .btn-buy {
            background: #334155;
            color: #64748b;
            pointer-events: none;
            opacity: 0.5;
        }
        .btn-buy.active {
            background: var(--green);
            color: #000;
            pointer-events: auto;
            opacity: 1;
        }

        /* Кнопка открытия инструкции */
        .rules-trigger {
            margin: 40px 0;
            background: transparent;
            color: var(--gold);
            border: 1px dashed var(--gold);
            padding: 15px 30px;
            cursor: pointer;
            font-size: 1.1rem;
            border-radius: 10px;
        }

        /* Скрытая инструкция */
        #rules-content {
            display: none;
            max-width: 800px;
            width: 90%;
            background: #0f0f11;
            padding: 30px;
            border-radius: 20px;
            border: 1px solid #1a1a1c;
            margin-bottom: 40px;
        }

        .rule-block h3 { color: var(--gold); margin-top: 20px; }
        .rule-block p { color: #888; font-size: 0.95rem; white-space: pre-line; }

        .agreement-box {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #1e1e22;
            padding: 20px;
            border-radius: 12px;
            margin-top: 30px;
            border: 1px solid var(--green);
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="top-bar">
    <button class="lang-btn active" onclick="setLang('ru')">RU</button>
    <button class="lang-btn" onclick="setLang('en')">EN</button>
</div>

<header>
    <h1 class="project-title">⚡ Spark Point 💎</h1>
    <p id="tagline" style="color: #64748b;">Premium Web3 Matrix System</p>
</header>

<div class="container">
    <div class="card">
        <h2 id="p1-name">🚀 Flash</h2>
        <div class="price-tag">50$</div>
        <div class="btn-group">
            <button class="btn btn-info lang-view" onclick="showCardInfo(1)">Посмотреть</button>
            <a href="https://creditscoringchain-sketch.github.io/SparkPoint303/?ref=0xc50970499f45d8e6fd943a09407ca8121379991" class="btn btn-buy lang-buy" target="_blank">Купить</a>
        </div>
    </div>

    <div class="card">
        <h2 id="p2-name">💰 Rapid</h2>
        <div class="price-tag">100$</div>
        <div class="btn-group">
            <button class="btn btn-info lang-view" onclick="showCardInfo(2)">Посмотреть</button>
            <a href="https://creditscoringchain-sketch.github.io/SparkPoint303/?ref=0xc50970499f45d8e6fd943a09407ca8121379991" class="btn btn-buy lang-buy" target="_blank">Купить</a>
        </div>
    </div>

    <div class="card">
        <h2 id="p3-name">🛡️ Vault</h2>
        <div class="price-tag">20$</div>
        <div class="btn-group">
            <button class="btn btn-info lang-view" onclick="showCardInfo(3)">Посмотреть</button>
            <a href="https://creditscoringchain-sketch.github.io/SparkPoint303/?ref=0xc50970499f45d8e6fd943a09407ca8121379991" class="btn btn-buy lang-buy" target="_blank">Купить</a>
        </div>
    </div>

    <div class="card">
        <h2 id="p4-name">💵 Validator</h2>
        <div class="price-tag">50$</div>
        <div class="btn-group">
            <button class="btn btn-info lang-view" onclick="showCardInfo(4)">Посмотреть</button>
            <a href="https://creditscoringchain-sketch.github.io/SparkPoint303/?ref=0xc50970499f45d8e6fd943a09407ca8121379991" class="btn btn-buy lang-buy" target="_blank">Купить</a>
        </div>
    </div>

    <div class="card">
        <h2 id="p5-name">👑 Genesis</h2>
        <div class="price-tag">100$</div>
        <div class="btn-group">
            <button class="btn btn-info lang-view" onclick="showCardInfo(5)">Посмотреть</button>
            <a href="https://creditscoringchain-sketch.github.io/SparkPoint303/?ref=0xc50970499f45d8e6fd943a09407ca8121379991" class="btn btn-buy lang-buy" target="_blank">Купить</a>
        </div>
    </div>
</div>

<button class="rules-trigger" id="rules-btn" onclick="toggleRules()">Открыть инструкцию и правила</button>

<div id="rules-content">
    <div class="rule-block" id="full-rules">
        </div>

    <div class="agreement-box" onclick="agree()">
        <input type="checkbox" id="agreeCheck">
        <label for="agreeCheck" id="label-agree">Я прочитал правила и беру ответственность на себя</label>
    </div>
</div>

<script>
    const translations = {
        ru: {
            tagline: "Premium Web3 Matrix System",
            view: "Посмотреть",
            buy: "Купить",
            rulesBtn: "Открыть инструкцию и правила",
            agree: "Я прочитал правила и беру ответственность на себя",
            rulesText: `<h3>1. Классификация пакетов</h3>
            <p><b>Скоростные (Flash, Rapid):</b> Предназначены для максимально быстрого прохождения 3-х уровней. Входная сумма не возвращается отдельно, а включена в общую прибыль на выходе ($600 или $1200).</p>
            <p><b>Масштабные (Vault, Validator, Genesis):</b> Пакеты на 10 уровней с функцией «Безопасного старта». Как только вы приглашаете 2-х участников, смарт-контракт мгновенно возвращает сумму вашего входа на ваш личный кошелек.</p>
            <h3>2. Механика работы</h3>
            <p>Все процессы происходят на автопилоте. Смарт-контракт децентрализован: у администрации нет доступа к вашим средствам. Ваша задача: пригласить минимум 2-х активных участников.</p>
            <h3>3. Юридический отказ (Disclaimer)</h3>
            <p>Это не инвестиции, а краудфандинговая P2P-платформа. Мы не обещаем пассивный доход. Результат зависит от вашей активности. Вход является добровольным взносом за активацию кода.</p>`,
            info: [
                "Выход: 600$ | 3 уровня. Быстрый цикл.",
                "Выход: 1200$ | 3 уровня. Высокая скорость.",
                "Выход: 100 000$ | 10 уровней. Возврат после 2-х чел.",
                "Выход: 200 000$ | 10 уровней. Возврат после 2-х чел.",
                "Выход: 400 000$ | 10 уровней. Полная автоматизация."
            ]
        },
        en: {
            tagline: "Premium Web3 Matrix System",
            view: "View",
            buy: "Buy",
            rulesBtn: "Open Instructions & Rules",
            agree: "I have read the rules and take full responsibility",
            rulesText: `<h3>1. Package Classification</h3>
            <p><b>Speed (Flash, Rapid):</b> Designed for fast 3-level completion. The entry fee is not returned separately but included in the final profit ($600 or $1200).</p>
            <p><b>Scalable (Vault, Validator, Genesis):</b> 10-level packages with a "Safe Start" feature. Once you invite 2 participants, the smart contract instantly returns your entry fee.</p>
            <h3>2. How it works</h3>
            <p>All processes are on autopilot. The smart contract is decentralized: admin has no access to your funds. Your task: invite at least 2 active participants.</p>
            <h3>3. Disclaimer</h3>
            <p>This is not an investment, but a P2P crowdfunding platform. We do not promise passive income. Results depend on your activity. Entry is a voluntary fee for code activation.</p>`,
            info: [
                "Exit: $600 | 3 levels. Fast cycle.",
                "Exit: $1200 | 3 levels. High speed.",
                "Exit: $100,000 | 10 levels. Return after 2 invites.",
                "Exit: $200,000 | 10 levels. Return after 2 invites.",
                "Exit: $400,000 | 10 levels. Full automation."
            ]
        }
    };

    let currentLang = 'ru';

    function setLang(lang) {
        currentLang = lang;
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');

        document.getElementById('tagline').innerText = translations[lang].tagline;
        document.getElementById('rules-btn').innerText = translations[lang].rulesBtn;
        document.getElementById('label-agree').innerText = translations[lang].agree;
        document.getElementById('full-rules').innerHTML = translations[lang].rulesText;
        
        document.querySelectorAll('.lang-view').forEach(b => b.innerText = translations[lang].view);
        document.querySelectorAll('.lang-buy').forEach(b => b.innerText = translations[lang].buy);
    }

    function toggleRules() {
        const content = document.getElementById('rules-content');
        content.style.display = (content.style.display === 'block') ? 'none' : 'block';
    }

    function showCardInfo(id) {
        alert(translations[currentLang].info[id-1]);
    }

    function agree() {
        const cb = document.getElementById('agreeCheck');
        if (event.target.id !== 'agreeCheck') cb.checked = !cb.checked;
        
        const buyBtns = document.querySelectorAll('.lang-buy');
        buyBtns.forEach(btn => {
            if (cb.checked) btn.classList.add('active');
            else btn.classList.remove('active');
        });
    }

    // Инициализация
    setLang('ru');
</script>

</body>
</html>
