<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spark Point | Web3 Ecosystem</title>
    <style>
        :root {
            --gold: #ffcc00;
            --green: #00ff88;
            --bg: #050505;
            --card: #121214;
            --text: #e2e8f0;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 50px;
        }

        .top-bar {
            width: 100%;
            display: flex;
            justify-content: flex-end;
            padding: 20px;
            box-sizing: border-box;
        }

        .lang-btn {
            background: #1e1e22;
            color: var(--gold);
            border: 1px solid var(--gold);
            padding: 5px 15px;
            cursor: pointer;
            margin-left: 10px;
            border-radius: 5px;
            font-weight: bold;
        }

        .lang-btn.active { background: var(--gold); color: #000; }

        header { text-align: center; padding: 20px 0 40px; }
        .project-title {
            color: var(--gold);
            font-size: 3rem;
            font-weight: 900;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(255, 204, 0, 0.4);
            margin: 0;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            max-width: 1200px;
            width: 90%;
        }

        .card {
            background: var(--card);
            border: 1px solid #222;
            border-radius: 24px;
            padding: 25px;
            text-align: center;
            transition: 0.3s;
        }

        .price-tag { color: var(--gold); font-size: 2rem; font-weight: 800; margin: 15px 0; }

        .btn-group { display: flex; flex-direction: column; gap: 10px; }

        .btn {
            padding: 15px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            border: none;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-info { background: var(--gold); color: #000; }
        .btn-buy {
            background: #334155;
            color: #64748b;
            pointer-events: none;
            opacity: 0.5;
        }
        .btn-buy.active {
            background: var(--green);
            color: #000;
            pointer-events: auto;
            opacity: 1;
        }

        /* Кнопки действий */
        .actions-box {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin: 40px 0;
            width: 90%;
            max-width: 400px;
        }

        .btn-video {
            background: #ff0000;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-rules {
            background: transparent;
            color: var(--gold);
            border: 1px dashed var(--gold);
        }

        /* Модальное окно для видео */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            width: 90%;
            max-width: 800px;
            position: relative;
        }

        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 15px;
        }

        .close-modal {
            position: absolute;
            top: -40px; right: 0;
            color: #fff;
            font-size: 2rem;
            cursor: pointer;
        }

        #rules-content {
            display: none;
            max-width: 800px;
            width: 90%;
            background: #0f0f11;
            padding: 30px;
            border-radius: 20px;
            border: 1px solid #1a1a1c;
            margin-bottom: 40px;
            box-sizing: border-box;
        }

        .agreement-box {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #1e1e22;
            padding: 20px;
            border-radius: 12px;
            margin-top: 30px;
            border: 1px solid var(--green);
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="top-bar">
    <button id="btn-ru" class="lang-btn active" onclick="changeLang('ru')">RU</button>
    <button id="btn-en" class="lang-btn" onclick="changeLang('en')">EN</button>
</div>

<header>
    <h1 class="project-title">⚡ SPARK POINT 💎</h1>
    <p id="tagline" style="color: #64748b;">Premium Web3 Matrix System</p>
</header>

<div class="container">
    <div class="card">
        <h2>🚀 Flash</h2>
        <div class="price-tag">50$</div>
        <div class="btn-group">
            <button class="btn btn-info view-text" onclick="alertInfo(0)">Посмотреть</button>
            <a href="https://creditscoringchain-sketch.github.io/SparkPoint303/?ref=0xc50970499f45d8e6fd943a09407ca8121379991" class="btn btn-buy buy-text">Купить</a>
        </div>
    </div>
    <div class="card">
        <h2>💰 Rapid</h2>
        <div class="price-tag">100$</div>
        <div class="btn-group">
            <button class="btn btn-info view-text" onclick="alertInfo(1)">Посмотреть</button>
            <a href="https://creditscoringchain-sketch.github.io/SparkPoint303/?ref=0xc50970499f45d8e6fd943a09407ca8121379991" class="btn btn-buy buy-text">Купить</a>
        </div>
    </div>
    <div class="card">
        <h2>🛡️ Vault</h2>
        <div class="price-tag">20$</div>
        <div class="btn-group">
            <button class="btn btn-info view-text" onclick="alertInfo(2)">Посмотреть</button>
            <a href="https://creditscoringchain-sketch.github.io/SparkPoint303/?ref=0xc50970499f45d8e6fd943a09407ca8121379991" class="btn btn-buy buy-text">Купить</a>
        </div>
    </div>
    <div class="card">
        <h2>💵 Validator</h2>
        <div class="price-tag">50$</div>
        <div class="btn-group">
            <button class="btn btn-info view-text" onclick="alertInfo(3)">Посмотреть</button>
            <a href="https://creditscoringchain-sketch.github.io/SparkPoint303/?ref=0xc50970499f45d8e6fd943a09407ca8121379991" class="btn btn-buy buy-text">Купить</a>
        </div>
    </div>
    <div class="card">
        <h2>👑 Genesis</h2>
        <div class="price-tag">100$</div>
        <div class="btn-group">
            <button class="btn btn-info view-text" onclick="alertInfo(4)">Посмотреть</button>
            <a href="https://creditscoringchain-sketch.github.io/SparkPoint303/?ref=0xc50970499f45d8e6fd943a09407ca8121379991" class="btn btn-buy buy-text">Купить</a>
        </div>
    </div>
</div>

<div class="actions-box">
    <button class="btn btn-video" onclick="openVideo()">
        <span>📺</span> <span id="btn-video-text">Видео инструкция регистрации</span>
    </button>
    <button class="btn btn-rules" id="toggle-btn" onclick="toggleRules()">Открыть инструкцию и правила</button>
</div>

<div id="videoModal" class="modal" onclick="closeVideo()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close-modal" onclick="closeVideo()">&times;</span>
        <div class="video-wrapper">
            <iframe id="youtube-frame" src="" frameborder="0" allowfullscreen></iframe>
        </div>
    </div>
</div>

<div id="rules-content">
    <div id="text-block" class="rule-block"></div>
    <div class="agreement-box" onclick="handleAgree()">
        <input type="checkbox" id="agreeCheck">
        <label for="agreeCheck" id="agree-label" style="cursor:pointer">Я прочитал правила и беру ответственность на себя</label>
    </div>
</div>

<script>
    const content = {
        ru: {
            tagline: "Premium Web3 Matrix System",
            toggle: "Открыть инструкцию и правила",
            video: "Видео инструкция регистрации",
            view: "Посмотреть",
            buy: "Купить",
            agreeLabel: "Я прочитал правила и беру ответственность на себя",
            info: ["Flash: 600$", "Rapid: 1200$", "Vault: 100k$", "Validator: 200k$", "Genesis: 400k$"],
            rules: `<h3>1. Классификация</h3><p>Скоростные (Flash, Rapid) - без возврата. Масштабные (Vault, Validator, Genesis) - возврат после 2-х чел.</p><h3>2. Disclaimer</h3><p>Это P2P платформа. Не инвестиция. Выплаты зависят от активности.</p>`
        },
        en: {
            tagline: "Premium Web3 Matrix System",
            toggle: "Open Rules & Instructions",
            video: "Registration Video Guide",
            view: "View",
            buy: "Buy",
            agreeLabel: "I agree to the rules and take responsibility",
            info: ["Flash: 600$", "Rapid: 1200$", "Vault: 100k$", "Validator: 200k$", "Genesis: 400k$"],
            rules: `<h3>1. Classification</h3><p>Speed (Flash, Rapid) - no return. Scale (Vault, Validator, Genesis) - return after 2 invites.</p><h3>2. Disclaimer</h3><p>P2P Platform. Not an investment. Income depends on activity.</p>`
        }
    };

    let currentLang = 'ru';

    function changeLang(lang) {
        currentLang = lang;
        document.getElementById('btn-ru').classList.toggle('active', lang === 'ru');
        document.getElementById('btn-en').classList.toggle('active', lang === 'en');
        document.getElementById('tagline').innerText = content[lang].tagline;
        document.getElementById('toggle-btn').innerText = content[lang].toggle;
        document.getElementById('btn-video-text').innerText = content[lang].video;
        document.getElementById('agree-label').innerText = content[lang].agreeLabel;
        document.getElementById('text-block').innerHTML = content[lang].rules;
        document.querySelectorAll('.view-text').forEach(el => el.innerText = content[lang].view);
        document.querySelectorAll('.buy-text').forEach(el => el.innerText = content[lang].buy);
    }

    function openVideo() {
        document.getElementById('youtube-frame').src = "https://www.youtube.com/embed/KoYDCQw07Xs?autoplay=1";
        document.getElementById('videoModal').style.display = 'flex';
    }

    function closeVideo() {
        document.getElementById('videoModal').style.display = 'none';
        document.getElementById('youtube-frame').src = "";
    }

    function toggleRules() {
        const div = document.getElementById('rules-content');
        div.style.display = (div.style.display === 'block') ? 'none' : 'block';
    }

    function alertInfo(index) { alert(content[currentLang].info[index]); }

    function handleAgree() {
        const check = document.getElementById('agreeCheck');
        if (event.target.id !== 'agreeCheck') check.checked = !check.checked;
        document.querySelectorAll('.buy-text').forEach(btn => {
            if (check.checked) btn.classList.add('active');
            else btn.classList.remove('active');
        });
    }

    changeLang('ru');
</script>
</body>
</html>
