<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spark Point | Web3 Ecosystem</title>
    <style>
        :root {
            --gold: #ffcc00;
            --green: #00ff88;
            --bg: #050505;
            --card: #121214;
            --text: #e2e8f0;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 50px;
        }

        .top-bar {
            width: 100%;
            display: flex;
            justify-content: flex-end;
            padding: 20px;
            box-sizing: border-box;
        }

        .lang-btn {
            background: #1e1e22;
            color: var(--gold);
            border: 1px solid var(--gold);
            padding: 5px 15px;
            cursor: pointer;
            margin-left: 10px;
            border-radius: 5px;
            font-weight: bold;
        }

        .lang-btn.active {
            background: var(--gold);
            color: #000;
        }

        header { text-align: center; padding: 20px 0 40px; }
        .project-title {
            color: var(--gold);
            font-size: 3rem;
            font-weight: 900;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(255, 204, 0, 0.4);
            margin: 0;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            max-width: 1200px;
            width: 90%;
        }

        .card {
            background: var(--card);
            border: 1px solid #222;
            border-radius: 24px;
            padding: 25px;
            text-align: center;
            transition: 0.3s;
        }

        .price-tag { color: var(--gold); font-size: 2rem; font-weight: 800; margin: 15px 0; }

        .btn-group { display: flex; flex-direction: column; gap: 10px; }

        .btn {
            padding: 15px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            border: none;
            cursor: pointer;
        }

        .btn-info { background: var(--gold); color: #000; }
        .btn-buy {
            background: #334155;
            color: #64748b;
            pointer-events: none;
            opacity: 0.5;
        }
        .btn-buy.active {
            background: var(--green);
            color: #000;
            pointer-events: auto;
            opacity: 1;
        }

        /* Кнопка открытия инструкции */
        .rules-trigger {
            margin: 40px 0;
            background: transparent;
            color: var(--gold);
            border: 1px dashed var(--gold);
            padding: 15px 30px;
            cursor: pointer;
            border-radius: 10px;
        }

        /* Блок инструкции (скрыт по умолчанию) */
        #rules-content {
            display: none;
            max-width: 800px;
            width: 90%;
            background: #0f0f11;
            padding: 30px;
            border-radius: 20px;
            border: 1px solid #1a1a1c;
            margin-bottom: 40px;
            box-sizing: border-box;
        }

        .rule-block h3 { color: var(--gold); margin-top: 20px; }
        .rule-block p { color: #888; font-size: 0.95rem; line-height: 1.6; }

        .agreement-box {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #1e1e22;
            padding: 20px;
            border-radius: 12px;
            margin-top: 30px;
            border: 1px solid var(--green);
            cursor: pointer;
        }
        
        .agreement-box input { width: 20px; height: 20px; }
    </style>
</head>
<body>

<div class="top-bar">
    <button id="btn-ru" class="lang-btn active" onclick="changeLang('ru')">RU</button>
    <button id="btn-en" class="lang-btn" onclick="changeLang('en')">EN</button>
</div>

<header>
    <h1 class="project-title">⚡ SPARK POINT 💎</h1>
    <p id="tagline" style="color: #64748b;">Premium Web3 Matrix System</p>
</header>

<div class="container">
    <div class="card">
        <h2>🚀 Flash</h2>
        <div class="price-tag">50$</div>
        <div class="btn-group">
            <button class="btn btn-info view-text" onclick="alertInfo(0)">Посмотреть</button>
            <a href="ССЫЛКА_НА_ОПЛАТУ" class="btn btn-buy buy-text">Купить</a>
        </div>
    </div>
    <div class="card">
        <h2>💰 Rapid</h2>
        <div class="price-tag">100$</div>
        <div class="btn-group">
            <button class="btn btn-info view-text" onclick="alertInfo(1)">Посмотреть</button>
            <a href="ССЫЛКА_НА_ОПЛАТУ" class="btn btn-buy buy-text">Купить</a>
        </div>
    </div>
    <div class="card">
        <h2>🛡️ Vault</h2>
        <div class="price-tag">20$</div>
        <div class="btn-group">
            <button class="btn btn-info view-text" onclick="alertInfo(2)">Посмотреть</button>
            <a href="ССЫЛКА_НА_ОПЛАТУ" class="btn btn-buy buy-text">Купить</a>
        </div>
    </div>
    <div class="card">
        <h2>💵 Validator</h2>
        <div class="price-tag">50$</div>
        <div class="btn-group">
            <button class="btn btn-info view-text" onclick="alertInfo(3)">Посмотреть</button>
            <a href="ССЫЛКА_НА_ОПЛАТУ" class="btn btn-buy buy-text">Купить</a>
        </div>
    </div>
    <div class="card">
        <h2>👑 Genesis</h2>
        <div class="price-tag">100$</div>
        <div class="btn-group">
            <button class="btn btn-info view-text" onclick="alertInfo(4)">Посмотреть</button>
            <a href="ССЫЛКА_НА_ОПЛАТУ" class="btn btn-buy buy-text">Купить</a>
        </div>
    </div>
</div>

<button class="rules-trigger" id="toggle-btn" onclick="toggleRules()">Открыть инструкцию и правила</button>

<div id="rules-content">
    <div id="text-block" class="rule-block">
        </div>

    <div class="agreement-box" onclick="handleAgree()">
        <input type="checkbox" id="agreeCheck">
        <label for="agreeCheck" id="agree-label" style="cursor:pointer">Я прочитал правила и беру ответственность на себя</label>
    </div>
</div>

<script>
    const content = {
        ru: {
            tagline: "Premium Web3 Matrix System",
            toggle: "Открыть инструкцию и правила",
            view: "Посмотреть",
            buy: "Купить",
            agreeLabel: "Я прочитал правила и беру ответственность на себя",
            info: [
                "Flash: Выход 600$. 3 уровня. Без возврата входа.",
                "Rapid: Выход 1200$. 3 уровня. Без возврата входа.",
                "Vault: Выход 100 000$. 10 уровней. Возврат после 2-х участников.",
                "Validator: Выход 200 000$. 10 уровней. Возврат после 2-х участников.",
                "Genesis: Выход 400 000$. 10 уровней. Возврат после 2-х участников."
            ],
            rules: `
                <h3>1. Классификация пакетов</h3>
                <p><b>Скоростные (Flash, Rapid):</b> Предназначены для максимально быстрого прохождения 3-х уровней. Весь входящий поток средств направлен на достижение финальной выплаты ($600 или $1200). Входная сумма включена в общую прибыль.</p>
                <p><b>Масштабные (Vault, Validator, Genesis):</b> Пакеты на 10 уровней с функцией «Безопасного старта». Как только вы приглашаете 2-х участников, смарт-контракт мгновенно возвращает сумму вашего входа на ваш личный кошелек.</p>
                <h3>2. Механика работы</h3>
                <p>Все процессы (распределение средств, апгрейды уровней, выплаты) происходят на автопилоте. Смарт-контракт децентрализован: у администрации нет доступа к вашим средствам.</p>
                <h3>3. Юридический отказ (Disclaimer)</h3>
                <p>Это не инвестиции, а краудфандинговая P2P-платформа. Мы не обещаем пассивный доход. Результат зависит от вашей активности. Участник берет на себя все риски.</p>
                <h3>4. Условие участия</h3>
                <p>Ваша задача: Пригласить минимум 2-х активных участников. Всё остальное делает программный код.</p>
            `
        },
        en: {
            tagline: "Premium Web3 Matrix System",
            toggle: "Open Instructions and Rules",
            view: "View",
            buy: "Buy",
            agreeLabel: "I have read the rules and take full responsibility",
            info: [
                "Flash: Exit 600$. 3 levels. No entry return.",
                "Rapid: Exit 1200$. 3 levels. No entry return.",
                "Vault: Exit 100 000$. 10 levels. Return after 2 invites.",
                "Validator: Exit 200 000$. 10 levels. Return after 2 invites.",
                "Genesis: Exit 400 000$. 10 levels. Return after 2 invites."
            ],
            rules: `
                <h3>1. Package Classification</h3>
                <p><b>Speed (Flash, Rapid):</b> Designed for 3-level completion. All funds go toward the final payout ($600 or $1200). Entry fee is part of the profit.</p>
                <p><b>Scalable (Vault, Validator, Genesis):</b> 10-level packages with "Safe Start". Once you invite 2 members, the entry fee returns to your wallet immediately.</p>
                <h3>2. How it works</h3>
                <p>All processes are on autopilot via smart-contract. Admin has no access to funds. Your task: invite 2 active members.</p>
                <h3>3. Disclaimer</h3>
                <p>Not an investment. P2P crowdfunding. No passive income promised. Results depend on your activity. Participant takes all risks.</p>
            `
        }
    };

    let currentLang = 'ru';

    function changeLang(lang) {
        currentLang = lang;
        document.getElementById('btn-ru').classList.toggle('active', lang === 'ru');
        document.getElementById('btn-en').classList.toggle('active', lang === 'en');
        
        document.getElementById('tagline').innerText = content[lang].tagline;
        document.getElementById('toggle-btn').innerText = content[lang].toggle;
        document.getElementById('agree-label').innerText = content[lang].agreeLabel;
        document.getElementById('text-block').innerHTML = content[lang].rules;
        
        document.querySelectorAll('.view-text').forEach(el => el.innerText = content[lang].view);
        document.querySelectorAll('.buy-text').forEach(el => el.innerText = content[lang].buy);
    }

    function toggleRules() {
        const div = document.getElementById('rules-content');
        div.style.display = (div.style.display === 'block') ? 'none' : 'block';
    }

    function alertInfo(index) {
        alert(content[currentLang].info[index]);
    }

    function handleAgree() {
        const check = document.getElementById('agreeCheck');
        if (event.target.id !== 'agreeCheck') check.checked = !check.checked;
        
        const buyBtns = document.querySelectorAll('.buy-text');
        buyBtns.forEach(btn => {
            if (check.checked) btn.classList.add('active');
            else btn.classList.remove('active');
        });
    }

    // Запуск RU при старте
    changeLang('ru');
</script>

</body>
</html>
